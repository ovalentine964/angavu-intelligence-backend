# =============================================================
# Angavu Intelligence — Main Docker Compose
# Full stack for development / dedicated servers (8GB+ RAM)
#
# Memory budget (~11.6GB used):
#   postgres:    2G        (pgvector + TimescaleDB)
#   pgbouncer:   128M      (connection pooler)
#   redis:       512M
#   clickhouse:  2G
#   backend:     2G
#   worker:      1.5G
#   openwa:      1G
#   whisper:     2G
#   nginx:       128M
#   ─────────────────
#   Total:       ~11.2G
#
# Usage:
#   docker compose up -d
#   docker compose --profile with-whisper up -d
# =============================================================

services:
  # ─── PostgreSQL — Economic Data + pgvector + TimescaleDB ──
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile.postgres-extended
    container_name: msaidizi-postgres
    environment:
      - POSTGRES_DB=msaidizi
      - POSTGRES_USER=msaidizi
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/migrations/001_enable_pgvector.sql:/docker-entrypoint-initdb.d/02-pgvector.sql
      - ./database/migrations/002_enable_timescaledb.sql:/docker-entrypoint-initdb.d/03-timescaledb.sql
      - ./database/migrations/003_table_partitioning.sql:/docker-entrypoint-initdb.d/04-partitioning.sql
      - ./database/migrations/004_connection_pooling_and_replicas.sql:/docker-entrypoint-initdb.d/05-pooling.sql
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=5
      - -c
      - max_replication_slots=5
      - -c
      - max_connections=200
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msaidizi -d msaidizi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - biashara-net

  # ─── PgBouncer — Connection Pooler ───────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: msaidizi-pgbouncer
    environment:
      - DATABASE_URL=postgresql://msaidizi:${DB_PASSWORD}@postgres:5432/msaidizi
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=25
      - MIN_POOL_SIZE=5
      - SERVER_IDLE_TIMEOUT=300
      - SERVER_CONNECT_TIMEOUT=5
      - SERVER_CHECK_DELAY=10
      - SERVER_CHECK_QUERY=SELECT 1
      - LOG_CONNECTIONS=1
      - LOG_DISCONNECTIONS=1
    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./config/pgbouncer_userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 32M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - biashara-net

  # ─── PostgreSQL Read Replica ──────────────────────────────
  # Uncomment when ready to deploy a read replica.
  # Requires: primary running with wal_level=replica (already set above).
  #
  # To set up:
  #   1. Create replication slot on primary:
  #      SELECT pg_create_physical_replication_slot('replica_1', true);
  #   2. Uncomment this service
  #   3. Run: docker compose up -d postgres-replica
  #
  # postgres-replica:
  #   image: postgres:16-alpine
  #   container_name: msaidizi-postgres-replica
  #   environment:
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #   volumes:
  #     - postgres-replica-data:/var/lib/postgresql/data
  #   command:
  #     - bash
  #     - -c
  #     - |
  #       # Wait for primary
  #       until pg_isready -h postgres -p 5432 -U msaidizi; do sleep 1; done
  #       # If data dir is empty, do base backup from primary
  #       if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
  #         pg_basebackup -h postgres -U msaidizi_replication -D /var/lib/postgresql/data -Fp -Xs -P -R
  #       fi
  #       exec postgres
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "127.0.0.1:5433:5432"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G
  #         cpus: '0.5'
  #     reservations:
  #       memory: 256M
  #       cpus: '0.1'
  #   restart: unless-stopped
  #   networks:
  #     - biashara-net

  # ─── Redis — Caching & Queues ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: msaidizi-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 10
      --save 900 1
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - biashara-net

  # ─── ClickHouse — Analytics & Time-Series ────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: biashara-clickhouse
    environment:
      - CLICKHOUSE_DB=biashara
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9001:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - biashara-net

  # ─── Backend — FastAPI Application ───────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biashara-intelligence-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_URL=postgresql+asyncpg://msaidizi:${DB_PASSWORD}@postgres:5432/msaidizi
      - DATABASE_POOL_SIZE=20
      - DATABASE_MAX_OVERFLOW=10
      - DATABASE_POOL_TIMEOUT=30
      - DATABASE_POOL_RECYCLE=1800
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENWA_URL=http://openwa:3000
      - OPENWA_WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET}
      - ENABLE_WHATSAPP=${ENABLE_WHATSAPP:-false}
      - DEPLOYMENT_HARNESS_ENABLED=true
      - CANARY_1PCT_HOLD_S=${CANARY_1PCT_HOLD_S:-300}
      - CANARY_10PCT_HOLD_S=${CANARY_10PCT_HOLD_S:-600}
      - CANARY_50PCT_HOLD_S=${CANARY_50PCT_HOLD_S:-1800}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=biashara
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - biashara-net

  # ─── Task Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biashara-task-worker
    command: python -m app.worker
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://msaidizi:${DB_PASSWORD}@postgres:5432/msaidizi
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=5
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.Redis(host='redis', port=6379, password='${REDIS_PASSWORD}'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - biashara-net

  # ─── OpenWA — WhatsApp Automation (OPTIONAL) ─────────────
  # OpenWA does NOT block backend startup.
  # Backend handles WhatsApp being unavailable gracefully.
  # Set ENABLE_WHATSAPP=true in .env to enable.
  openwa:
    build:
      context: ./openwa
      dockerfile: Dockerfile
    container_name: msaidizi-openwa
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - OPENWA_PORT=3000
      - OPENWA_BACKEND_URL=http://backend:8000
      - OPENWA_WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET}
      - LOG_LEVEL=info
    volumes:
      - openwa-data:/app/data
    # No depends_on: OpenWA starts independently of backend.
    # This prevents the QR-code scan from blocking the entire stack.
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # 5 min: allow time for QR scan; reports unhealthy after timeout
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    restart: unless-stopped  # Auto-restart; won't block other services
    networks:
      - biashara-net

  # ─── Whisper — Speech-to-Text (optional) ─────────────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: msaidizi-whisper
    profiles: ["with-whisper"]
    ports:
      - "127.0.0.1:9002:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper-models:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - biashara-net

  # ─── Nginx — Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: angavu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - biashara-net

networks:
  biashara-net:
    driver: bridge

volumes:
  postgres-data:
  # postgres-replica-data:  # Uncomment when read replica is deployed
  redis-data:
  clickhouse-data:
  openwa-data:
  whisper-models:
