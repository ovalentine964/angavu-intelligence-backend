version: "3.9"

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://angavu:angavu_pass@postgres:5432/angavu
  REDIS_URL: redis://redis:6379/0
  CLICKHOUSE_URL: http://clickhouse:8123
  ENVIRONMENT: production
  LOG_LEVEL: INFO

services:
  # ── PostgreSQL 16 + pgvector + TimescaleDB ──────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: angavu
      POSTGRES_USER: angavu
      POSTGRES_PASSWORD: angavu_pass
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - config/postgresql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U angavu -d angavu"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  # ── ClickHouse 24 (OLAP) ───────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - chdata:/var/lib/clickhouse
      - config/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1.2G

  # ── PgBouncer ──────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgresql://angavu:angavu_pass@postgres:5432/angavu
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
    ports: ["6432:5432"]
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Angavu Intelligence Backend ────────────────────────────
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://angavu:angavu_pass@pgbouncer:5432/angavu
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped

  # ── Celery Worker (background intelligence) ────────────────
  worker:
    build: .
    command: celery -A app.services.worker worker -l info -c 4
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://angavu:angavu_pass@pgbouncer:5432/angavu
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 1.5G
    restart: unless-stopped

volumes:
  pgdata:
  chdata:
  redisdata:
