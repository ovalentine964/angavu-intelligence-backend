version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biashara-intelligence-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_URL=postgresql://msaidizi:${DB_PASSWORD}@postgres:5432/msaidizi
      - REDIS_URL=redis://redis:6379/0
      - OPENWA_API_URL=http://openwa:8080
      - OPENWA_API_KEY=${OPENWA_API_KEY}
      - OPENWA_SESSION_ID=msaidizi
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - openwa
    restart: unless-stopped

  openwa:
    image: openwa/wa-automate:latest
    container_name: msaidizi-openwa
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_KEY=${OPENWA_API_KEY}
      - SESSION_ID=msaidizi
    volumes:
      - openwa-data:/app/session-data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: msaidizi-postgres
    environment:
      - POSTGRES_DB=msaidizi
      - POSTGRES_USER=msaidizi
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: msaidizi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  openwa-data:
