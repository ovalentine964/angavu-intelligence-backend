version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biashara-intelligence-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_URL=postgresql+asyncpg://msaidizi:${DB_PASSWORD}@postgres:5432/msaidizi
      - DATABASE_POOL_SIZE=20
      - DATABASE_MAX_OVERFLOW=10
      - DATABASE_POOL_TIMEOUT=30
      - DATABASE_POOL_RECYCLE=1800
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENWA_URL=http://openwa:3000
      - OPENWA_WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=biashara
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - biashara-net

  openwa:
    build:
      context: ./openwa
      dockerfile: Dockerfile
    container_name: msaidizi-openwa
    ports:
      - "3000:3000"
    environment:
      - OPENWA_PORT=3000
      - OPENWA_BACKEND_URL=http://backend:8000
      - OPENWA_WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET}
      - WHISPER_API_URL=http://whisper:9000
      - LOG_LEVEL=info
    volumes:
      - openwa-data:/app/data
    depends_on:
      backend:
        condition: service_healthy
      whisper:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - biashara-net

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: msaidizi-whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper-models:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - biashara-net

  postgres:
    image: postgres:15-alpine
    container_name: msaidizi-postgres
    environment:
      - POSTGRES_DB=msaidizi
      - POSTGRES_USER=msaidizi
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msaidizi -d msaidizi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - biashara-net

  redis:
    image: redis:7-alpine
    container_name: msaidizi-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    networks:
      - biashara-net

  # ---------------------------------------------------------------
  # Task worker — processes background jobs from Redis queue
  # ---------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biashara-task-worker
    command: python -m app.worker
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://msaidizi:${DB_PASSWORD}@postgres:5432/msaidizi
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=5
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.Redis.from_url('${REDIS_URL}'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    networks:
      - biashara-net

  # ---------------------------------------------------------------
  # ClickHouse — analytical queries on 600M+ records
  # 30-200x faster than PostgreSQL for aggregations, time-series,
  # and dashboard queries.
  # ---------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: biashara-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=biashara
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    networks:
      - biashara-net

networks:
  biashara-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  openwa-data:
  whisper-models:
  clickhouse_data:
