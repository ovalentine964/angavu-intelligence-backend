version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biashara-intelligence-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_URL=postgresql://msaidizi:${DB_PASSWORD}@postgres:5432/msaidizi
      - REDIS_URL=redis://redis:6379/0
      - OPENWA_URL=http://openwa:3000
      - OPENWA_WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  openwa:
    build:
      context: ./openwa
      dockerfile: Dockerfile
    container_name: msaidizi-openwa
    ports:
      - "3000:3000"
    environment:
      - OPENWA_PORT=3000
      - OPENWA_BACKEND_URL=http://backend:8000
      - OPENWA_WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET}
      - WHISPER_API_URL=http://whisper:9000
      - LOG_LEVEL=info
    volumes:
      - openwa-data:/app/data
    depends_on:
      - backend
      - whisper
    restart: unless-stopped

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: msaidizi-whisper
    ports:
      - "9000:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper-models:/root/.cache
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: msaidizi-postgres
    environment:
      - POSTGRES_DB=msaidizi
      - POSTGRES_USER=msaidizi
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: msaidizi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  openwa-data:
  whisper-models:
