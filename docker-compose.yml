# Angavu Intelligence Backend — Docker Compose
# Architecture: arch_backend.md
# Target: Oracle Cloud Free Tier (2 ARM OCPUs, 12GB RAM, 200GB storage)
#
# Memory Budget (~8.1GB of 12GB):
#   postgres:    2GB
#   redis:       512MB
#   backend:     2GB
#   worker:      1.5GB
#   nginx:       128MB
#   ─────────────────
#   Total:       ~6.1GB (5.9GB headroom)

services:
  # ─── PostgreSQL — Economic Data ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: angavu-postgres
    environment:
      POSTGRES_DB: msaidizi
      POSTGRES_USER: msaidizi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    networks:
      - angavu-net

  # ─── Redis — Caching & Queues ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: angavu-redis
    command: >
      redis-server
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - angavu-net

  # ─── Backend — API Server ────────────────────────────────
  backend:
    build: .
    container_name: angavu-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://msaidizi:${POSTGRES_PASSWORD}@postgres:5432/msaidizi
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped
    networks:
      - angavu-net

  # ─── Worker — Background Tasks ───────────────────────────
  worker:
    build: .
    container_name: angavu-worker
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://msaidizi:${POSTGRES_PASSWORD}@postgres:5432/msaidizi
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 1.5G
    restart: unless-stopped
    networks:
      - angavu-net

  # ─── Nginx — Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: angavu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    networks:
      - angavu-net

volumes:
  postgres-data:
  redis-data:

networks:
  angavu-net:
    driver: bridge
