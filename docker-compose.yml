# Angavu Intelligence Backend — Docker Compose
# Architecture: arch_backend.md §3
# Target: Oracle Cloud Free Tier (2 ARM OCPUs, 12GB RAM, 200GB storage)
#
# Resource Budget (~4.3GB of 12GB):
#   postgres:    1.5GB
#   redis:       256MB
#   clickhouse:  1GB
#   backend:     512MB
#   worker:      512MB
#   nginx:       64MB
#   prometheus:  256MB
#   grafana:     128MB
#   ─────────────────
#   Total:       ~4.3GB (7.7GB headroom)

services:
  # ─── PostgreSQL — Primary Data Store ─────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: angavu-postgres
    command: >
      postgres
      -c shared_buffers=384MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
      -c random_page_cost=1.1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biashara}
      POSTGRES_USER: ${POSTGRES_USER:-angavu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1536M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-angavu}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - angavu-net

  # ─── Redis — Cache + Queues + FL State ───────────────────
  redis:
    image: redis:7-alpine
    container_name: angavu-redis
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - angavu-net

  # ─── ClickHouse — Analytics Engine ───────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: angavu-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-biashara}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 1024M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - angavu-net

  # ─── Backend — API Server ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: angavu-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-angavu}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-biashara}
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-biashara}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY}
      BUYER_JWT_SECRET: ${BUYER_JWT_SECRET}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - angavu-net

  # ─── Worker — Background Tasks ───────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: angavu-worker
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-angavu}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-biashara}
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-biashara}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
    restart: unless-stopped
    networks:
      - angavu-net

  # ─── Nginx — Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: angavu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - angavu-net

  # ─── Prometheus — Metrics ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: angavu-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 256M
    restart: unless-stopped
    networks:
      - angavu-net

  # ─── Grafana — Dashboards ────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: angavu-grafana
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 128M
    restart: unless-stopped
    networks:
      - angavu-net

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:

networks:
  angavu-net:
    driver: bridge
