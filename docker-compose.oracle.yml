# =============================================================
# Angavu Intelligence — Oracle Cloud Docker Compose
# Optimized for Oracle Free Tier: ARM A1.Flex (2 OCPUs, 12GB RAM)
#
# Memory budget (~10.9GB used, ~1.1GB headroom for OS):
#   postgres:    2G
#   redis:       256M
#   clickhouse:  2G
#   api:         2G
#   worker:      1.5G
#   openwa:      1G
#   whisper:     1.5G
#   nginx:       128M
#   ─────────────────
#   Total:       ~10.9G
#
# Usage:
#   docker compose -f docker-compose.oracle.yml up -d
#   docker compose -f docker-compose.oracle.yml --profile with-whisper up -d
# =============================================================

services:
  # ─── PostgreSQL — Economic Data ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: biashara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biashara
      POSTGRES_USER: biashara
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biashara -d biashara"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    networks:
      - biashara-net

  # ─── Redis — Caching & Task Queue ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: biashara-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --save 300 10
      --save 900 1
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    networks:
      - biashara-net

  # ─── ClickHouse — Analytics & Time-Series ────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: biashara-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: biashara
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-changeme}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    networks:
      - biashara-net

  # ─── API Server ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.oracle
    container_name: biashara-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - APP_ENV=production
      - DEPLOYMENT_HARNESS_ENABLED=true
      - CANARY_1PCT_HOLD_S=${CANARY_1PCT_HOLD_S:-300}
      - CANARY_10PCT_HOLD_S=${CANARY_10PCT_HOLD_S:-600}
      - CANARY_50PCT_HOLD_S=${CANARY_50PCT_HOLD_S:-1800}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - biashara-net

  # ─── Task Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.oracle
    container_name: biashara-worker
    command: python -m app.worker
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=production
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.Redis(host='redis', port=6379, password='$(REDIS_PASSWORD:-changeme)'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - biashara-net

  # ─── OpenWA — WhatsApp Automation ────────────────────────
  openwa:
    build:
      context: ./openwa
      dockerfile: Dockerfile
    container_name: biashara-openwa
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - OPENWA_PORT=3000
      - OPENWA_BACKEND_URL=http://api:8000
      - OPENWA_WEBHOOK_SECRET=${OPENWA_WEBHOOK_SECRET:-changeme}
      - LOG_LEVEL=info
    volumes:
      - openwa-data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    networks:
      - biashara-net

  # ─── Whisper — Speech-to-Text (optional, use --profile with-whisper) ──
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: biashara-whisper
    profiles: ["with-whisper"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:9002:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    volumes:
      - whisper-models:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    networks:
      - biashara-net

  # ─── Nginx — Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: biashara-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - biashara-net

networks:
  biashara-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  app-data:
  app-logs:
  openwa-data:
  whisper-models:
