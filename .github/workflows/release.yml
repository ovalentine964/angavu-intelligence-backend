name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────
  # 1. Build release binaries for all platforms
  # ──────────────────────────────────────
  build:
    name: 🔨 Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: angavu-api-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: angavu-api-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: angavu-api-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: angavu-api-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM Linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-api/target
          key: ${{ matrix.target }}-cargo-release-${{ hashFiles('rust-api/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-release-

      - name: Build (native)
        if: "!matrix.cross"
        working-directory: rust-api
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: rust-api
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd rust-api/target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz angavu-api
          cd ../../..
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            rust-api/${{ matrix.artifact }}.tar.gz
            rust-api/${{ matrix.artifact }}.sha256

  # ──────────────────────────────────────
  # 2. Build and push Docker image
  # ──────────────────────────────────────
  docker:
    name: 🐳 Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: rust-api
          file: rust-api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/rust-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/rust-api:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository }}/rust-api:${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository }}/rust-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────
  # 3. Create GitHub Release
  # ──────────────────────────────────────
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
          body: |
            ## Angavu Intelligence Rust API ${{ github.ref_name }}

            ### Docker Image
            ```bash
            docker pull ghcr.io/${{ github.repository }}/rust-api:${{ github.ref_name }}
            ```

            ### Binaries
            Download the binary for your platform from the assets below.

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `angavu-api-linux-amd64.tar.gz` |
            | Linux ARM64 | `angavu-api-linux-arm64.tar.gz` |
            | macOS x86_64 | `angavu-api-darwin-amd64.tar.gz` |
            | macOS ARM64 | `angavu-api-darwin-arm64.tar.gz` |

            ### Quick Start
            ```bash
            # Extract
            tar xzf angavu-api-linux-amd64.tar.gz

            # Run
            DATABASE_URL=... JWT_SECRET=... ./angavu-api
            ```
