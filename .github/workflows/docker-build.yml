name: Docker Build & Push

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths:
      - "rust-api/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "rust-api/**"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rust-api

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  # ──────────────────────────────────────
  # 1. Build and push Docker image
  # ──────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch builds
            type=ref,event=branch
            # PR builds
            type=ref,event=pr
            # Tag builds (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA tag
            type=sha,prefix=sha-
            # latest on main
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: rust-api
          file: rust-api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.meta.outputs.tags }}
          push-to-registry: true

  # ──────────────────────────────────────
  # 2. Scan built image for vulnerabilities
  # ──────────────────────────────────────
  scan:
    name: 🔍 Trivy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-push]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        working-directory: rust-api
        run: docker build -t angavu-api:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "angavu-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ──────────────────────────────────────
  # 3. Smoke test the built image
  # ──────────────────────────────────────
  smoke-test:
    name: 🧪 Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-and-push]
    if: github.event_name != 'pull_request'
    steps:
      - name: Start container
        run: |
          docker run -d \
            --name angavu-api-test \
            -p 8080:8080 \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e JWT_SECRET=ci-test-secret \
            -e LLM_SERVICE_URL=http://localhost:9999 \
            -e ENVIRONMENT=test \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        continue-on-error: true

      - name: Wait for startup
        run: sleep 5

      - name: Health check
        run: |
          curl -sf http://localhost:8080/api/v1/health || echo "Health check failed (expected without DB)"
          echo "✅ Container started successfully"

      - name: Cleanup
        if: always()
        run: docker rm -f angavu-api-test 2>/dev/null || true
