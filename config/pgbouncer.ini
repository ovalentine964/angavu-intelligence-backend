# PgBouncer Configuration — Angavu Intelligence
# =====================================================
# Connection pooler for PostgreSQL. Sits between the app
# and PostgreSQL to manage connection limits efficiently.
#
# Usage:
#   docker run -d --name pgbouncer \
#     -e DATABASE_URL="postgresql://msaidizi:PASS@postgres:5432/msaidizi" \
#     -e POOL_MODE=transaction \
#     -e MAX_CLIENT_CONN=1000 \
#     -e DEFAULT_POOL_SIZE=25 \
#     -p 6432:5432 \
#     edoburu/pgbouncer
#
# Or add to docker-compose.yml (see pgbouncer service below).
# =====================================================

[databases]
; Main database — routes to PostgreSQL primary
msaidizi = host=postgres port=5432 dbname=msaidizi

; Read-only database — routes to read replica (when available)
; Uncomment when replica is deployed:
; msaidizi_ro = host=postgres-replica port=5432 dbname=msaidizi

[pgbouncer]
; === Connection Limits ===
; Max client connections (what apps can open to pgbouncer)
max_client_conn = 1000

; Pool size per user/database pair (actual connections to PostgreSQL)
default_pool_size = 25

; Min pool size (keep warm connections ready)
min_pool_size = 5

; Reserve connections for superuser (admin/debug)
superuser_reserved_connections = 3

; === Pooling Mode ===
; transaction: pool after each transaction (best for most apps)
; session: pool when client disconnects (safest, less efficient)
; statement: pool after each statement (most aggressive, breaks transactions)
pool_mode = transaction

; === Timeouts ===
; How long a client can sit idle in pool (seconds)
server_idle_timeout = 300

; How long to wait for a connection from pool (seconds)
server_connect_timeout = 5

; How long a client connection can be idle (seconds)
client_idle_timeout = 0

; Query timeout (seconds, 0 = disabled)
query_timeout = 0

; === Health Checks ===
; How often to check if server connections are alive (seconds)
server_check_delay = 10

; Query to test server connection liveness
server_check_query = SELECT 1

; === Logging ===
; Log connections/disconnections
log_connections = 1
log_disconnections = 1

; Log slow queries (seconds)
log_stats = 1

; === Authentication ===
; Use auth_file for local users
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; === Admin ===
; Allow admin commands on pgbouncer admin database
admin_users = msaidizi
stats_users = msaidizi

; === Performance ===
; Packet size for network I/O
pkt_buf = 4096

; Listen backlog
listen_backlog = 128

; TCP keepalive
tcp_keepalive = 1
tcp_keepidle = 300
tcp_keepintvl = 60

; === DNS ===
; DNS lookup timeout (seconds)
dns_max_ttl = 15

; === Limits per user ===
; Per-user connection limit (0 = unlimited)
; user_max_connections = 50
