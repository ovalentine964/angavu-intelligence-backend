# Angavu Intelligence — DeerFlow Agent Configuration
# Defines agent roles, models, tools, and system prompts for the
# DeerFlow-powered multi-agent orchestration layer.

models:
  - name: deepseek-chat
    provider: deepseek
    model: deepseek-chat
    api_key: ${DEEPSEEK_API_KEY}
    supports_thinking: false
    supports_vision: false

  - name: deepseek-reasoner
    provider: deepseek
    model: deepseek-reasoner
    api_key: ${DEEPSEEK_API_KEY}
    supports_thinking: true
    supports_vision: false

# Tool groups — Biashara-specific intelligence tools
tools:
  - name: soko_pulse
    group: biashara
    use: app.biashara_tools.soko_pulse:soko_pulse_tool

  - name: alama_score
    group: biashara
    use: app.biashara_tools.alama_score:alama_score_tool

  - name: distribution_gap
    group: biashara
    use: app.biashara_tools.distribution_gap:distribution_gap_tool

  - name: fmcg_intelligence
    group: biashara
    use: app.biashara_tools.fmcg_intelligence:fmcg_intelligence_tool

  - name: worker_intelligence
    group: biashara
    use: app.biashara_tools.worker_intelligence:worker_intelligence_tool

# Agent definitions
agents:
  research:
    name: research
    description: >
      Market research agent for Kenya's informal economy. Specializes in
      demand forecasting, price intelligence, and consumer surplus analysis
      using Soko Pulse data.
    model: deepseek-reasoner
    tool_groups:
      - biashara
    skills:
      - market_research

  credit:
    name: credit
    description: >
      Credit assessment agent for informal businesses. Computes Alama scores
      (300-850), applies Heckman correction for selection bias, and provides
      Bayesian default probability estimates.
    model: deepseek-chat
    tool_groups:
      - biashara
    skills:
      - credit_assessment

  distribution:
    name: distribution
    description: >
      Distribution analysis agent for FMCG companies. Identifies coverage gaps,
      underserved markets, and expansion opportunities using Distribution Gap
      and FMCG Intelligence tools.
    model: deepseek-chat
    tool_groups:
      - biashara
    skills:
      - distribution_analysis

  fmcg:
    name: fmcg
    description: >
      FMCG intelligence agent for manufacturers (Pwani Oil, Unilever, Bidco).
      Tracks informal channel sales, optimizes routes-to-market, and analyzes
      trade promotion ROI.
    model: deepseek-chat
    tool_groups:
      - biashara

  health:
    name: health
    description: >
      Health economics agent specializing in health infrastructure scoring,
      worker health metrics, and health-economic nexus analysis for the
      informal economy.
    model: deepseek-chat
    tool_groups:
      - biashara

  development:
    name: development
    description: >
      African development intelligence agent. Analyzes GDP estimation,
      inflation tracking, tax base expansion, and business cycle analysis
      for East African economies.
    model: deepseek-reasoner
    tool_groups:
      - biashara

# Skills — loaded from skills/ directory
skills:
  container_path: /mnt/skills
  directories:
    - skills
