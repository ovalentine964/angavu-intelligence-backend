# PostgreSQL Read Replica Configuration
# =====================================================
# This file documents how to set up a read replica.
# It's not a runnable config — it's a deployment guide.
#
# Architecture:
#   App → PgBouncer (write pool) → PostgreSQL Primary
#   App → PgBouncer (read pool)  → PostgreSQL Replica
#
# The primary sends WAL (Write-Ahead Log) to replicas
# via streaming replication.
# =====================================================

# === On the PRIMARY server ===
# Add to postgresql.conf (or via ALTER SYSTEM):

# wal_level = replica
# max_wal_senders = 5
# max_replication_slots = 5
# wal_keep_size = 1024  # MB
# hot_standby = on

# Add to pg_hba.conf:
# host replication msaidizi_replication <replica_ip>/32 md5

# Create replication slot:
# SELECT pg_create_physical_replication_slot('replica_1', true);

# === On the REPLICA server ===
# 1. Stop PostgreSQL
# 2. Clear data directory
# 3. Run pg_basebackup:
#    pg_basebackup -h <primary_ip> -U msaidizi_replication -D /var/lib/postgresql/data -Fp -Xs -P -R
# 4. The -R flag creates standby.signal and sets primary_conninfo
# 5. Start PostgreSQL — it will connect to primary and start streaming

# === docker-compose.yml for replica ===
# (See commented section in docker-compose.yml)

# === PgBouncer split ===
# In pgbouncer.ini, configure two databases:
#   msaidizi = host=postgres-primary port=5432 dbname=msaidizi
#   msaidizi_ro = host=postgres-replica port=5432 dbname=msaidizi
#
# App connects to:
#   Write: postgresql://...@pgbouncer:6432/msaidizi
#   Read:  postgresql://...@pgbouncer:6432/msaidizi_ro
