<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Angavu Intelligence logo — abstracted eye with concentric arcs">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D42"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#E8A838" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0.2"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="72" ry="72"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle radial glow behind eye -->
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
    <rect width="512" height="512" fill="url(#glow)"/>

    <!-- Eye centered at 256, 228 -->
    <g transform="translate(256, 228)">
      <!-- Outer arc (largest) -->
      <path d="M-180,0 A180,140 0 0 1 180,0" fill="none" stroke="#E8A838" stroke-width="4" opacity="0.2"/>
      <!-- Second arc -->
      <path d="M-145,0 A145,112 0 0 1 145,0" fill="none" stroke="#E8A838" stroke-width="4.5" opacity="0.35"/>
      <!-- Third arc -->
      <path d="M-110,0 A110,85 0 0 1 110,0" fill="none" stroke="#E8A838" stroke-width="5" opacity="0.55"/>
      <!-- Fourth arc -->
      <path d="M-80,0 A80,62 0 0 1 80,0" fill="none" stroke="#E8A838" stroke-width="5.5" opacity="0.75"/>
      <!-- Inner arc -->
      <path d="M-55,0 A55,42 0 0 1 55,0" fill="none" stroke="#E8A838" stroke-width="6" opacity="0.9"/>

      <!-- Iris circle -->
      <circle cx="0" cy="0" r="32" fill="none" stroke="#E8A838" stroke-width="5"/>

      <!-- Pupil -->
      <circle cx="0" cy="0" r="14" fill="#E8A838"/>

      <!-- Highlight -->
      <circle cx="8" cy="-8" r="5" fill="#FFFFFF" opacity="0.5"/>
      <circle cx="-4" cy="4" r="2.5" fill="#FFFFFF" opacity="0.25"/>

      <!-- Lower arcs (mirror, subtle) -->
      <path d="M-180,0 A180,140 0 0 0 180,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.08"/>
      <path d="M-145,0 A145,112 0 0 0 145,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.12"/>
      <path d="M-110,0 A110,85 0 0 0 110,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.15"/>
    </g>

    <!-- Text: ANGAVU -->
    <text x="256" y="370" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="4">ANGAVU</text>

    <!-- Text: INTELLIGENCE -->
    <text x="256" y="405" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="300" fill="#E8A838" letter-spacing="7" opacity="0.85">INTELLIGENCE</text>

    <!-- Divider line -->
    <line x1="156" y1="420" x2="356" y2="420" stroke="#E8A838" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Rounded border -->
  <rect x="2" y="2" width="508" height="508" rx="72" ry="72" fill="none" stroke="#E8A838" stroke-width="2" opacity="0.15"/>
</svg>
