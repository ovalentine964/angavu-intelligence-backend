<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="50%" stop-color="#0F2D42"/>
      <stop offset="100%" stop-color="#1B4965"/>
    </linearGradient>
    <radialGradient id="nairobiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0C060" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#E8A838" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGlow" cx="20%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0"/>
      <stop offset="20%" stop-color="#E8A838" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#E8A838" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#ambientGlow)"/>

  <!-- Left: Bold Angavu Icon (Neural Network Africa) -->
  <g transform="translate(200, 155)">
    <!-- Africa outline — bold, unmistakable -->
    <path d="M-73,-120 L-38,-125 L-10,-128 L15,-130 L35,-127 L55,-120 L68,-110
             L75,-95 L78,-80 L82,-65 L80,-52 L85,-35 L82,-18 L78,-5
             L82,8 L77,20 L85,30 L83,42 L78,55 L70,62 L60,68
             L45,78 L30,85 L12,95 L0,102 L-8,108
             L-18,100 L-22,88 L-28,78 L-32,65 L-35,50
             L-38,35 L-40,18 L-42,0 L-45,-15
             L-52,-28 L-62,-38 L-72,-48 L-78,-60
             L-80,-75 L-77,-90 L-73,-105 L-73,-120Z"
      fill="#E8A838" fill-opacity="0.06" stroke="#E8A838" stroke-width="3" stroke-linejoin="round"/>

    <!-- Madagascar -->
    <ellipse cx="88" cy="48" rx="7" ry="16" fill="#E8A838" fill-opacity="0.04" stroke="#E8A838" stroke-width="1.5" transform="rotate(12,88,48)"/>

    <!-- Thick connection lines from Nairobi HQ -->
    <g stroke="#E8A838" stroke-linecap="round" opacity="0.45">
      <line x1="20" y1="27" x2="-8" y2="-110" stroke-width="2.5"/>
      <line x1="20" y1="27" x2="-58" y2="0" stroke-width="2.5"/>
      <line x1="20" y1="27" x2="-20" y2="50" stroke-width="2.5"/>
      <line x1="20" y1="27" x2="55" y2="-25" stroke-width="2.5"/>
      <line x1="20" y1="27" x2="-25" y2="80" stroke-width="2.5"/>
      <line x1="20" y1="27" x2="20" y2="90" stroke-width="2.5"/>
      <line x1="20" y1="27" x2="-50" y2="-60" stroke-width="2.5"/>
      <line x1="20" y1="27" x2="60" y2="20" stroke-width="2.5"/>
      <!-- Regional cross-connections -->
      <line x1="-8" y1="-110" x2="-58" y2="0" stroke-width="1.5"/>
      <line x1="-8" y1="-110" x2="-50" y2="-60" stroke-width="1.5"/>
      <line x1="-58" y1="0" x2="-20" y2="50" stroke-width="1.5"/>
      <line x1="-20" y1="50" x2="-25" y2="80" stroke-width="1.5"/>
      <line x1="55" y1="-25" x2="60" y2="20" stroke-width="1.5"/>
      <line x1="20" y1="90" x2="-25" y2="80" stroke-width="1.5"/>
    </g>

    <!-- 8 Large City Nodes -->
    <circle cx="-8" cy="-110" r="7" fill="#E8A838"/>       <!-- Cairo -->
    <circle cx="-50" cy="-60" r="6.5" fill="#E8A838"/>      <!-- Casablanca -->
    <circle cx="-58" cy="0" r="7" fill="#E8A838"/>          <!-- Lagos -->
    <circle cx="-20" cy="50" r="6.5" fill="#E8A838"/>       <!-- Addis Ababa -->
    <circle cx="55" cy="-25" r="6.5" fill="#E8A838"/>       <!-- Dar es Salaam -->
    <circle cx="-25" cy="80" r="7" fill="#E8A838"/>         <!-- Kinshasa -->
    <circle cx="20" cy="90" r="7" fill="#E8A838"/>          <!-- Johannesburg -->
    <circle cx="60" cy="20" r="6.5" fill="#E8A838"/>        <!-- Cape Town -->

    <!-- NAIROBI HQ — glowing, prominent -->
    <circle cx="20" cy="27" r="20" fill="url(#nairobiGlow)" filter="url(#glow)"/>
    <circle cx="20" cy="27" r="12" fill="#F0C060" stroke="#FFFFFF" stroke-width="2.5"/>

    <!-- KENYA HQ label -->
    <text x="20" y="2" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="1">KENYA</text>
    <text x="20" y="12" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="#FFFFFF" opacity="0.7">HQ</text>
  </g>

  <!-- Gold accent line separator -->
  <line x1="380" y1="40" x2="380" y2="280" stroke="url(#goldLine)" stroke-width="2"/>

  <!-- Right: Text -->
  <g transform="translate(440, 0)">
    <!-- ANGAVU -->
    <text x="0" y="135" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="8">ANGAVU</text>

    <!-- Intelligence -->
    <text x="4" y="185" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="300" fill="#E8A838" letter-spacing="12" opacity="0.9">Intelligence</text>

    <!-- Tagline separator -->
    <line x1="4" y1="205" x2="480" y2="205" stroke="#E8A838" stroke-width="1" opacity="0.2"/>

    <!-- Tagline -->
    <text x="4" y="235" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" opacity="0.55" letter-spacing="1.5">Africa's Operating System for the Informal Economy</text>

    <!-- Tech stack line -->
    <text x="4" y="265" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="300" fill="#FFFFFF" opacity="0.3" letter-spacing="1.5">On-Device AI · Federated Learning · Voice-First · Offline-First</text>
  </g>

  <!-- Corner accents -->
  <circle cx="25" cy="25" r="3" fill="#E8A838" opacity="0.25"/>
  <circle cx="1175" cy="25" r="3" fill="#E8A838" opacity="0.25"/>
  <circle cx="25" cy="295" r="3" fill="#E8A838" opacity="0.25"/>
  <circle cx="1175" cy="295" r="3" fill="#E8A838" opacity="0.25"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1198" height="318" rx="12" ry="12" fill="none" stroke="#E8A838" stroke-width="0.5" opacity="0.08"/>
</svg>