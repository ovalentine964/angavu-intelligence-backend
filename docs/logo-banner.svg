<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Angavu Intelligence — Clarity for Africa's Invisible Economy">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D42"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8A838"/>
      <stop offset="100%" stop-color="#F0C060"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#E8A838" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0.3"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="1200" height="300" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="1200" height="300" fill="url(#bgGrad)"/>

    <!-- Subtle grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1E5577" stroke-width="0.3" opacity="0.3"/>
    </pattern>
    <rect width="1200" height="300" fill="url(#grid)"/>

    <!-- Left section: Eye icon -->
    <g transform="translate(150, 150)">
      <!-- Outer arc (largest) -->
      <path d="M-100,0 A100,80 0 0 1 100,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.25"/>
      <!-- Second arc -->
      <path d="M-78,0 A78,62 0 0 1 78,0" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.45"/>
      <!-- Third arc -->
      <path d="M-56,0 A56,44 0 0 1 56,0" fill="none" stroke="#E8A838" stroke-width="3" opacity="0.7"/>
      <!-- Inner arc -->
      <path d="M-36,0 A36,28 0 0 1 36,0" fill="none" stroke="#E8A838" stroke-width="3.5" opacity="0.9"/>

      <!-- Iris -->
      <circle cx="0" cy="0" r="18" fill="none" stroke="#E8A838" stroke-width="3"/>

      <!-- Pupil -->
      <circle cx="0" cy="0" r="8" fill="#E8A838"/>

      <!-- Light reflection -->
      <circle cx="5" cy="-5" r="3" fill="#FFFFFF" opacity="0.6"/>

      <!-- Lower arcs (mirror, fainter) -->
      <path d="M-100,0 A100,80 0 0 0 100,0" fill="none" stroke="#E8A838" stroke-width="1.5" opacity="0.12"/>
      <path d="M-78,0 A78,62 0 0 0 78,0" fill="none" stroke="#E8A838" stroke-width="1.5" opacity="0.18"/>
    </g>

    <!-- Separator line -->
    <line x1="280" y1="70" x2="280" y2="230" stroke="#E8A838" stroke-width="1" opacity="0.3"/>

    <!-- Right section: Text -->
    <g transform="translate(320, 0)">
      <!-- ANGAVU -->
      <text x="0" y="135" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="6">ANGAVU</text>

      <!-- INTELLIGENCE -->
      <text x="2" y="180" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="300" fill="#E8A838" letter-spacing="10" opacity="0.95">INTELLIGENCE</text>

      <!-- Divider -->
      <line x1="2" y1="200" x2="500" y2="200" stroke="#E8A838" stroke-width="1" opacity="0.4"/>

      <!-- Tagline -->
      <text x="2" y="228" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="300" fill="#FFFFFF" letter-spacing="3" opacity="0.65">Clarity for Africa's Invisible Economy</text>
    </g>

    <!-- Corner accent dots -->
    <circle cx="30" cy="30" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="1170" cy="30" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="30" cy="270" r="3" fill="#E8A838" opacity="0.5"/>
    <circle cx="1170" cy="270" r="3" fill="#E8A838" opacity="0.5"/>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="298" rx="16" ry="16" fill="none" stroke="#E8A838" stroke-width="1" opacity="0.2"/>
</svg>
