# ════════════════════════════════════════════════════════════════════
# Angavu Intelligence — Oracle Cloud Free Tier Deployment
#
# Resource budget: 4 OCPU, 24GB RAM (ARM Ampere A1)
#
# Services:
#   1. FastAPI app        (~512MB)
#   2. PostgreSQL 16      (~1GB)
#   3. Redis 7            (~256MB)
#   4. llama.cpp server   (~6GB for Qwen 2.5 7B Q4_K_M)
#   5. Nginx reverse proxy (~64MB)
#
# Total: ~8GB allocated, ~16GB headroom for OS + burst
# ════════════════════════════════════════════════════════════════════

version: "3.8"

services:
  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: angavu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FastAPI Application ─────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: deploy/oracle/Dockerfile
    container_name: angavu-app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-angavu}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-biashara}
      - REDIS_URL=redis://redis:6379/0
      - LLM_HOST=llama-cpp
      - LLM_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - app-data:/app/data

  # ── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: angavu-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-angavu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-biashara}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-angavu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: angavu-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── llama.cpp Server (Qwen 2.5 7B Q4_K_M) ─────────────────────
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: angavu-llama
    # Override entrypoint for ARM64 compatibility
    entrypoint: []
    command: >
      sh -c "
        /server
        --host 0.0.0.0
        --port 8080
        --model /models/${LLAMA_MODEL_FILE:-qwen2.5-7b-q4_k_m.gguf}
        --ctx-size 4096
        --n-predict 512
        --threads 2
        --n-gpu-layers 0
        --cont-batching
        --flash-attn
        --chat-template chatml
      "
    volumes:
      - llama-models:/models
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 6G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Model loading can take a while

volumes:
  postgres-data:
  redis-data:
  app-data:
  llama-models:
