# Oracle Cloud Infrastructure — Training Loop Deployment
# For Angavu Intelligence federated learning and model training
#
# This configuration provisions:
# 1. OCI Container Instance for training orchestrator
# 2. OCI Data Science ML Job for GPU training
# 3. OCI Object Storage for model artifacts
# 4. OCI Autonomous Database for training metadata
# 5. OCI Functions for lightweight aggregation tasks
#
# Academic Foundation:
# - Training infrastructure supports the 8-agent training loop
# - GPU instances handle LoRA fine-tuning and model evaluation
# - Object storage stores model checkpoints and adapter deltas
# - Functions handle per-round FedAvg aggregation
#
# Cost Optimization:
# - Preemptible/spot instances for training jobs (60-80% savings)
# - Auto-scaling based on pending update queue depth
# - Model artifacts stored in Infrequent Access tier after 30 days

# ════════════════════════════════════════════════════════════════════
# Variables
# ════════════════════════════════════════════════════════════════════

variable "tenancy_ocid" {
  description = "OCI Tenancy OCID"
  type        = string
}

variable "compartment_ocid" {
  description = "OCI Compartment for training infrastructure"
  type        = string
}

variable "region" {
  description = "OCI Region (e.g., af-johannesburg-1 for Africa)"
  type        = string
  default     = "af-johannesburg-1"
}

variable "training_gpu_shape" {
  description = "GPU shape for training jobs"
  type        = string
  # A10 GPU: 1x NVIDIA A10 (24GB VRAM) — good for LoRA fine-tuning
  # For larger models: VM.GPU.A10.2 (2x A10)
  default = "VM.GPU.A10.1"
}

variable "environment" {
  description = "Deployment environment"
  type        = string
  default     = "production"
}

# ════════════════════════════════════════════════════════════════════
# Networking
# ════════════════════════════════════════════════════════════════════

resource "oci_core_vcn" "training_vcn" {
  compartment_id = var.compartment_ocid
  cidr_block     = "10.0.0.0/16"
  display_name   = "angavu-training-vcn"
  dns_label      = "angavutrain"

  freeform_tags = {
    "project"     = "angavu-intelligence"
    "component"   = "training-infrastructure"
    "environment" = var.environment
  }
}

resource "oci_core_subnet" "training_subnet" {
  compartment_id = var.compartment_ocid
  vcn_id         = oci_core_vcn.training_vcn.id
  cidr_block     = "10.0.1.0/24"
  display_name   = "angavu-training-subnet"
  dns_label      = "trainsub"

  security_list_ids = [oci_core_security_list.training_security_list.id]
}

resource "oci_core_security_list" "training_security_list" {
  compartment_id = var.compartment_ocid
  vcn_id         = oci_core_vcn.training_vcn.id
  display_name   = "angavu-training-sl"

  # Egress: allow all outbound (model downloads, API calls)
  egress_security_rules {
    destination = "0.0.0.0/0"
    protocol    = "all"
  }

  # Ingress: only from internal network
  ingress_security_rules {
    source   = "10.0.0.0/16"
    protocol = "6"  # TCP
    tcp_options {
      min = 8080
      max = 8080
    }
  }
}

# ════════════════════════════════════════════════════════════════════
# Object Storage — Model Artifacts
# ════════════════════════════════════════════════════════════════════

resource "oci_objectstorage_bucket" "model_artifacts" {
  compartment_id = var.compartment_ocid
  name           = "angavu-model-artifacts"
  namespace      = data.oci_objectstorage_namespace.ns.namespace
  storage_tier   = "Standard"
  versioning     = "Enabled"

  # Auto-tier to IA after 30 days
  auto_tiering = "InfrequentAccess"

  freeform_tags = {
    "project"   = "angavu-intelligence"
    "component" = "model-storage"
  }
}

resource "oci_objectstorage_bucket" "training_data" {
  compartment_id = var.compartment_ocid
  name           = "angavu-training-data"
  namespace      = data.oci_objectstorage_namespace.ns.namespace
  storage_tier   = "Standard"

  freeform_tags = {
    "project"   = "angavu-intelligence"
    "component" = "training-data"
  }
}

data "oci_objectstorage_namespace" "ns" {
  compartment_id = var.tenancy_ocid
}

# ════════════════════════════════════════════════════════════════════
# Container Instance — Training Orchestrator
# ════════════════════════════════════════════════════════════════════

resource "oci_container_instances_container_instance" "training_orchestrator" {
  compartment_id = var.compartment_ocid
  display_name   = "angavu-training-orchestrator"
  availability_domain = data.oci_identity_availability_domains.ads.availability_domains[0].name

  shape = "CI.Standard.A1.Flex"
  shape_config {
    ocpus       = 2
    memory_in_gbs = 8
  }

  containers {
    display_name = "training-loop"
    image        = "ocir.io/${var.tenancy_ocid}/angavu-intelligence/training-loop:latest"

    environment_variables = {
      "TRAINING_MODE"           = "orchestrator"
      "OCI_BUCKET_MODELS"       = oci_objectstorage_bucket.model_artifacts.name
      "OCI_BUCKET_TRAINING_DATA" = oci_objectstorage_bucket.training_data.name
      "OCI_REGION"              = var.region
      "FL_AGGREGATION_INTERVAL" = "3600"  # 1 hour
      "MIN_UPDATES_PER_ROUND"   = "5"
      "DP_EPSILON"              = "1.0"
      "DP_DELTA"                = "1e-5"
      "LOG_LEVEL"               = "INFO"
    }

    resource_config {
      vcpus_limit  = 2
      memory_limit_in_gbs = 8
    }
  }

  vnics {
    subnet_id = oci_core_subnet.training_subnet.id
    is_public_ip = false
  }

  freeform_tags = {
    "project"   = "angavu-intelligence"
    "component" = "training-orchestrator"
  }
}

# ════════════════════════════════════════════════════════════════════
# Data Science — ML Training Job Template
# ════════════════════════════════════════════════════════════════════

resource "oci_datascience_project" "angavu_training" {
  compartment_id = var.compartment_ocid
  display_name   = "angavu-intelligence-training"
  description    = "Training project for Angavu Intelligence models"
}

resource "oci_datascience_model_deployment" "lora_training" {
  compartment_id = var.compartment_ocid
  display_name   = "angavu-lora-training"
  model_deployment_configuration_details {
    configuration_type = "SINGLE_MODEL"
    model_configuration_details {
      instance_configuration {
        instance_shape = var.training_gpu_shape
        subnet_id      = oci_core_subnet.training_subnet.id
      }
      scaling_policy {
        policy_type = "FIXED"
        instance_count = 1
      }
      model_id = oci_datascience_model.base_model.id
    }
  }

  freeform_tags = {
    "project"   = "angavu-intelligence"
    "component" = "lora-training"
  }
}

resource "oci_datascience_model" "base_model" {
  compartment_id      = var.compartment_ocid
  project_id          = oci_datascience_project.angavu_training.id
  display_name        = "angavu-base-whisper-swahili"
  description         = "Base Whisper model for Swahili STT, fine-tuned with LoRA"
  artifact_content_length = 0  # Placeholder — upload actual model artifact
}

# ════════════════════════════════════════════════════════════════════
# Autonomous Database — Training Metadata
# ════════════════════════════════════════════════════════════════════

resource "oci_database_autonomous_database" "training_metadata" {
  compartment_id                      = var.compartment_ocid
  db_name                             = "angavutrain"
  display_name                        = "angavu-training-metadata"
  admin_password                      = var.db_admin_password
  cpu_core_count                      = 1
  data_storage_size_in_tbs            = 1
  is_auto_scaling_enabled             = true
  is_free_tier                        = false
  license_model                       = "LICENSE_INCLUDED"
  is_preview_version_with_service_terms_accepted = false

  freeform_tags = {
    "project"   = "angavu-intelligence"
    "component" = "training-metadata"
  }
}

# ════════════════════════════════════════════════════════════════════
# OCI Functions — FedAvg Aggregation
# ════════════════════════════════════════════════════════════════════

resource "oci_functions_application" "fl_aggregation" {
  compartment_id = var.compartment_ocid
  display_name   = "angavu-fl-aggregation"
  subnet_ids     = [oci_core_subnet.training_subnet.id]
}

resource "oci_functions_function" "fedavg_round" {
  application_id = oci_functions_application.fl_aggregation.id
  display_name   = "fedavg-aggregation-round"
  memory_in_mbs  = 2048
  timeout_in_seconds = 300

  # Docker image containing the FedAvg aggregation logic
  image = "ocir.io/${var.tenancy_ocid}/angavu-intelligence/fedavg:latest"

  config = {
    "DP_EPSILON"         = "1.0"
    "DP_DELTA"           = "1e-5"
    "MIN_UPDATES"        = "5"
    "L2_CLIP_NORM"       = "5.0"
    "MODEL_BUCKET"       = oci_objectstorage_bucket.model_artifacts.name
  }
}

# ════════════════════════════════════════════════════════════════════
# Monitoring & Alarms
# ════════════════════════════════════════════════════════════════════

resource "oci_monitoring_alarm" "training_job_failure" {
  compartment_id = var.compartment_ocid
  display_name   = "angavu-training-job-failure"
  metric_compartment_id = var.compartment_ocid
  namespace      = "oci_datascience"
  query          = "JobRunStatus[1m].count() > 0 && LastError != ''"
  severity       = "CRITICAL"
  destinations   = [oci_ons_notification_topic.alerts.id]

  freeform_tags = {
    "project" = "angavu-intelligence"
  }
}

resource "oci_ons_notification_topic" "alerts" {
  compartment_id = var.compartment_ocid
  name           = "angavu-training-alerts"
}

# ════════════════════════════════════════════════════════════════════
# Outputs
# ════════════════════════════════════════════════════════════════════

output "orchestrator_ip" {
  value = oci_container_instances_container_instance.training_orchestrator.vnics[0].private_ip
}

output "model_bucket" {
  value = oci_objectstorage_bucket.model_artifacts.name
}

output "training_db_connection" {
  value     = oci_database_autonomous_database.training_metadata.connection_urls
  sensitive = true
}

output "function_endpoint" {
  value = oci_functions_function.fedavg_round.invoke_endpoint
}
