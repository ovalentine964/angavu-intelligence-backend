<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Neural network (center-left) -->
  <g transform="translate(80, 100)" filter="url(#glow)">
    <g stroke="#F59E0B" stroke-width="1.5" opacity="0.6" fill="none">
      <line x1="180" y1="40" x2="140" y2="100"/>
      <line x1="180" y1="40" x2="230" y2="90"/>
      <line x1="140" y1="100" x2="230" y2="90"/>
      <line x1="140" y1="100" x2="100" y2="170"/>
      <line x1="230" y1="90" x2="270" y2="160"/>
      <line x1="140" y1="100" x2="190" y2="210"/>
      <line x1="230" y1="90" x2="190" y2="210"/>
      <line x1="100" y1="170" x2="190" y2="210"/>
      <line x1="270" y1="160" x2="190" y2="210"/>
      <line x1="100" y1="170" x2="130" y2="260"/>
      <line x1="190" y1="210" x2="130" y2="260"/>
      <line x1="190" y1="210" x2="240" y2="270"/>
      <line x1="270" y1="160" x2="240" y2="270"/>
      <line x1="130" y1="260" x2="180" y2="330"/>
      <line x1="240" y1="270" x2="180" y2="330"/>
      <line x1="190" y1="210" x2="180" y2="330"/>
      <line x1="240" y1="270" x2="290" y2="300"/>
      <line x1="270" y1="160" x2="290" y2="300"/>
      <line x1="290" y1="300" x2="180" y2="330"/>
      <line x1="100" y1="170" x2="80" y2="220"/>
      <line x1="80" y1="220" x2="130" y2="260"/>
    </g>

    <circle cx="180" cy="40" r="10" fill="#22C55E"/>
    <circle cx="140" cy="100" r="8" fill="#22C55E"/>
    <circle cx="230" cy="90" r="8" fill="#22C55E"/>
    <circle cx="100" cy="170" r="7" fill="#22C55E"/>
    <circle cx="270" cy="160" r="7" fill="#22C55E"/>
    <circle cx="80" cy="220" r="5" fill="#22C55E"/>
    <circle cx="190" cy="210" r="9" fill="#22C55E"/>
    <circle cx="130" cy="260" r="7" fill="#22C55E"/>
    <circle cx="240" cy="270" r="7" fill="#22C55E"/>
    <circle cx="180" cy="330" r="9" fill="#22C55E"/>
    <circle cx="290" cy="300" r="6" fill="#F59E0B"/>
    <circle cx="190" cy="210" r="3" fill="#F59E0B"/>
  </g>

  <!-- Text -->
  <g>
    <text x="560" y="230" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="700" fill="url(#textGrad)" letter-spacing="-2">Angavu</text>
    <text x="560" y="310" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="300" fill="#e2e8f0" letter-spacing="-1">Intelligence</text>

    <text x="562" y="360" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#94a3b8" letter-spacing="5">AFRICA'S INFORMAL ECONOMY OS</text>

    <text x="562" y="420" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#64748b">
      Making invisible workers visible through data
    </text>

    <!-- Products -->
    <text x="562" y="470" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#475569">
      Msaidizi · Soko Pulse · Alama Score · Distribution Intelligence
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="400" height="20" fill="#22C55E"/>
  <rect x="400" y="610" width="400" height="20" fill="#F59E0B"/>
  <rect x="800" y="610" width="400" height="20" fill="#1E40AF"/>
</svg>
