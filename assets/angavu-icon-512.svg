<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D42"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="72" ry="72"/>
    </clipPath>
  </defs>
  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>
    <!-- Eye of Africa for512px -->
    <!-- Eye shape — gold almond outline -->
    <path d="M64,256 Q64,128 256,128 Q448,128 448,256 Q448,384 256,384 Q64,384 64,256 Z" fill="#E8A838" opacity="0.15"/>
    <!-- Top eyelid arcs (concentric) -->
    <path d="M80,256 Q80,148 256,148 Q432,148 432,256" fill="none" stroke="#E8A838" stroke-width="4" opacity="0.2"/>
    <path d="M96,256 Q96,158 256,158 Q416,158 416,256" fill="none" stroke="#E8A838" stroke-width="4.5" opacity="0.35"/>
    <path d="M112,256 Q112,170 256,170 Q400,170 400,256" fill="none" stroke="#E8A838" stroke-width="5" opacity="0.55"/>
    <path d="M128,256 Q128,180 256,180 Q384,180 384,256" fill="none" stroke="#E8A838" stroke-width="5.5" opacity="0.75"/>
    <path d="M148,256 Q148,192 256,192 Q364,192 364,256" fill="none" stroke="#E8A838" stroke-width="6" opacity="0.9"/>
    <!-- Bottom eyelid arcs (subtle reflection) -->
    <path d="M80,256 Q80,364 256,364 Q432,364 432,256" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.08"/>
    <path d="M96,256 Q96,354 256,354 Q416,354 416,256" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.12"/>
    <path d="M112,256 Q112,342 256,342 Q400,342 400,256" fill="none" stroke="#E8A838" stroke-width="2.5" opacity="0.15"/>
    <!-- Africa silhouette (sclera) -->
    <g transform="translate(240,200) scale(2.2)" opacity="0.2">
      <path d="M-8,-90 C2,-95 12,-93 20,-88 C28,-82 32,-72 34,-62 C36,-52 38,-40 42,-28 C46,-16 52,-4 56,8 C60,20 62,32 60,44 C58,56 52,68 44,78 C36,88 28,96 18,100 C8,104 0,104 -8,100 C-16,96 -22,88 -28,78 C-34,68 -38,56 -40,44 C-42,32 -42,20 -38,8 C-34,-4 -28,-16 -22,-28 C-16,-40 -12,-52 -10,-62 C-8,-72 -6,-82 -2,-88 C2,-92 -4,-90 -8,-90 Z" fill="#D09030"/>
    </g>
    <!-- Iris outer ring -->
    <circle cx="270" cy="232" r="60" fill="#D09030"/>
    <!-- Iris inner -->
    <circle cx="270" cy="232" r="46" fill="#F5C842"/>
    <!-- Pupil -->
    <circle cx="270" cy="232" r="18" fill="#1B4965"/>
    <!-- Highlights -->
    <circle cx="288" cy="214" r="10" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="252" cy="250" r="5" fill="#FFFFFF" opacity="0.25"/>
    <!-- Text -->
    <text x="256" y="370" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="4">ANGAVU</text>
    <text x="256" y="405" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="300" fill="#E8A838" letter-spacing="7" opacity="0.85">INTELLIGENCE</text>
    <line x1="156" y1="420" x2="356" y2="420" stroke="#E8A838" stroke-width="1" opacity="0.3"/>
    <text x="256" y="445" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="300" fill="#FFFFFF" letter-spacing="2" opacity="0.45">Clarity for Africa's Invisible Economy</text>
  </g>
  <rect x="2" y="2" width="508" height="508" rx="72" ry="72" fill="none" stroke="#E8A838" stroke-width="2" opacity="0.15"/>
