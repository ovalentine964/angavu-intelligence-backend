<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D42"/>
    </linearGradient>
    <radialGradient id="nairobiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0C060" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#E8A838" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="72" ry="72"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- BOLD AFRICA CONTINENT -->
    <g transform="translate(256,225)">
      <!-- Africa fill — bold, unmistakable -->
      <path d="M-73,-120 L-38,-125 L-10,-128 L15,-130 L35,-127 L55,-120 L68,-110
               L75,-95 L78,-80 L82,-65 L80,-52 L85,-35 L82,-18 L78,-5
               L82,8 L77,20 L85,30 L83,42 L78,55 L70,62 L60,68
               L45,78 L30,85 L12,95 L0,102 L-8,108
               L-18,100 L-22,88 L-28,78 L-32,65 L-35,50
               L-38,35 L-40,18 L-42,0 L-45,-15
               L-52,-28 L-62,-38 L-72,-48 L-78,-60
               L-80,-75 L-77,-90 L-73,-105 L-73,-120Z"
            fill="#E8A838" fill-opacity="0.08" stroke="#E8A838" stroke-width="3.5" stroke-linejoin="round"/>

      <!-- Madagascar -->
      <ellipse cx="88" cy="48" rx="8" ry="18" fill="#E8A838" fill-opacity="0.06" stroke="#E8A838" stroke-width="2" transform="rotate(12,88,48)"/>
    </g>

    <!-- CONNECTION LINES — thick, clear -->
    <g stroke="#E8A838" stroke-linecap="round" opacity="0.5">
      <!-- From Nairobi (HQ) to all cities -->
      <line x1="276" y1="252" x2="248" y2="112" stroke-width="2.5"/>
      <line x1="276" y1="252" x2="178" y2="215" stroke-width="2.5"/>
      <line x1="276" y1="252" x2="262" y2="185" stroke-width="2.5"/>
      <line x1="276" y1="252" x2="335" y2="158" stroke-width="2.5"/>
      <line x1="276" y1="252" x2="232" y2="290" stroke-width="2.5"/>
      <line x1="276" y1="252" x2="298" y2="310" stroke-width="2.5"/>
      <line x1="276" y1="252" x2="235" y2="360" stroke-width="2.5"/>
      <line x1="276" y1="252" x2="172" y2="162" stroke-width="2.5"/>
      <!-- Regional connections -->
      <line x1="248" y1="112" x2="178" y2="215" stroke-width="1.8"/>
      <line x1="248" y1="112" x2="262" y2="185" stroke-width="1.8"/>
      <line x1="248" y1="112" x2="335" y2="158" stroke-width="1.8"/>
      <line x1="178" y1="215" x2="172" y2="162" stroke-width="1.8"/>
      <line x1="178" y1="215" x2="232" y2="290" stroke-width="1.8"/>
      <line x1="232" y1="290" x2="298" y2="310" stroke-width="1.8"/>
      <line x1="298" y1="310" x2="235" y2="360" stroke-width="1.8"/>
      <line x1="262" y1="185" x2="335" y2="158" stroke-width="1.8"/>
      <line x1="335" y1="158" x2="298" y2="310" stroke-width="1.8"/>
    </g>

    <!-- CITY NODES — large, clear -->
    <!-- Cairo -->
    <circle cx="248" cy="112" r="8" fill="#E8A838"/>
    <!-- Casablanca -->
    <circle cx="172" cy="162" r="7" fill="#E8A838"/>
    <!-- Lagos -->
    <circle cx="178" cy="215" r="8" fill="#E8A838"/>
    <!-- Addis Ababa -->
    <circle cx="262" cy="185" r="7" fill="#E8A838"/>
    <!-- Dar es Salaam -->
    <circle cx="335" cy="158" r="7" fill="#E8A838"/>
    <!-- Kinshasa -->
    <circle cx="232" cy="290" r="7.5" fill="#E8A838"/>
    <!-- Johannesburg -->
    <circle cx="298" cy="310" r="7.5" fill="#E8A838"/>
    <!-- Cape Town -->
    <circle cx="235" cy="360" r="7" fill="#E8A838"/>

    <!-- NAIROBI HQ — 2x larger, bright gold, glow, white ring -->
    <circle cx="276" cy="252" r="22" fill="url(#nairobiGlow)"/>
    <circle cx="276" cy="252" r="13" fill="#F0C060" stroke="#FFFFFF" stroke-width="2.5"/>
    <text x="276" y="224" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" letter-spacing="1">KENYA</text>
    <text x="276" y="235" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#FFFFFF" opacity="0.75">HQ</text>

    <!-- ANGAVU text — bold, prominent -->
    <text x="256" y="415" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="700" fill="#FFFFFF" letter-spacing="6">ANGAVU</text>
    <text x="256" y="445" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="300" fill="#E8A838" letter-spacing="8" opacity="0.85">INTELLIGENCE</text>
    <line x1="156" y1="458" x2="356" y2="458" stroke="#E8A838" stroke-width="1.2" opacity="0.3"/>
  </g>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="72" ry="72" fill="none" stroke="#E8A838" stroke-width="1.5" opacity="0.12"/>
</svg>
