<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Connection lines (gold) -->
  <g stroke="#F59E0B" stroke-width="1.5" opacity="0.7" fill="none">
    <!-- North cluster -->
    <line x1="256" y1="72" x2="228" y2="110"/>
    <line x1="256" y1="72" x2="280" y2="100"/>
    <line x1="228" y1="110" x2="200" y2="130"/>
    <line x1="280" y1="100" x2="300" y2="128"/>
    <line x1="228" y1="110" x2="280" y2="100"/>
    <line x1="200" y1="130" x2="300" y2="128"/>

    <!-- Northwest connections -->
    <line x1="200" y1="130" x2="168" y2="170"/>
    <line x1="168" y1="170" x2="148" y2="210"/>
    <line x1="148" y1="210" x2="160" y2="248"/>

    <!-- West bulge -->
    <line x1="168" y1="170" x2="130" y2="195"/>
    <line x1="130" y1="195" x2="148" y2="210"/>

    <!-- East horn -->
    <line x1="300" y1="128" x2="340" y2="150"/>
    <line x1="340" y1="150" x2="360" y2="180"/>
    <line x1="360" y1="180" x2="350" y2="210"/>

    <!-- Central connections -->
    <line x1="200" y1="130" x2="240" y2="180"/>
    <line x1="300" y1="128" x2="280" y2="180"/>
    <line x1="240" y1="180" x2="280" y2="180"/>
    <line x1="240" y1="180" x2="220" y2="230"/>
    <line x1="280" y1="180" x2="300" y2="230"/>
    <line x1="220" y1="230" x2="300" y2="230"/>
    <line x1="240" y1="180" x2="260" y2="250"/>
    <line x1="280" y1="180" x2="260" y2="250"/>

    <!-- South connections -->
    <line x1="220" y1="230" x2="200" y2="280"/>
    <line x1="300" y1="230" x2="310" y2="270"/>
    <line x1="260" y1="250" x2="250" y2="300"/>
    <line x1="200" y1="280" x2="250" y2="300"/>
    <line x1="310" y1="270" x2="250" y2="300"/>
    <line x1="200" y1="280" x2="230" y2="340"/>
    <line x1="250" y1="300" x2="240" y2="360"/>
    <line x1="310" y1="270" x2="290" y2="320"/>
    <line x1="290" y1="320" x2="240" y2="360"/>
    <line x1="230" y1="340" x2="240" y2="360"/>
    <line x1="240" y1="360" x2="248" y2="400"/>

    <!-- Madagascar -->
    <line x1="310" y1="270" x2="370" y2="300"/>
    <line x1="350" y1="210" x2="370" y2="300"/>

    <!-- Cross connections for network density -->
    <line x1="160" y1="248" x2="220" y2="230"/>
    <line x1="350" y1="210" x2="300" y2="230"/>
    <line x1="160" y1="248" x2="200" y2="280"/>
    <line x1="148" y1="210" x2="200" y2="130"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- North Africa -->
    <circle cx="256" cy="72" r="8" fill="url(#nodeGlow)"/>
    <circle cx="228" cy="110" r="6" fill="#22C55E"/>
    <circle cx="280" cy="100" r="6" fill="#22C55E"/>

    <!-- Northwest -->
    <circle cx="200" cy="130" r="7" fill="url(#nodeGlow)"/>
    <circle cx="168" cy="170" r="5.5" fill="#22C55E"/>
    <circle cx="130" cy="195" r="4.5" fill="#22C55E"/>
    <circle cx="148" cy="210" r="6" fill="#22C55E"/>
    <circle cx="160" cy="248" r="5" fill="#22C55E"/>

    <!-- East / Horn -->
    <circle cx="300" cy="128" r="7" fill="url(#nodeGlow)"/>
    <circle cx="340" cy="150" r="5" fill="#22C55E"/>
    <circle cx="360" cy="180" r="5.5" fill="#22C55E"/>
    <circle cx="350" cy="210" r="5" fill="#22C55E"/>

    <!-- Central -->
    <circle cx="240" cy="180" r="6" fill="#22C55E"/>
    <circle cx="280" cy="180" r="6" fill="#22C55E"/>
    <circle cx="220" cy="230" r="7" fill="url(#nodeGlow)"/>
    <circle cx="300" cy="230" r="6" fill="#22C55E"/>
    <circle cx="260" cy="250" r="6.5" fill="#22C55E"/>

    <!-- South -->
    <circle cx="200" cy="280" r="5.5" fill="#22C55E"/>
    <circle cx="310" cy="270" r="5" fill="#22C55E"/>
    <circle cx="250" cy="300" r="6" fill="#22C55E"/>
    <circle cx="230" cy="340" r="5" fill="#22C55E"/>
    <circle cx="290" cy="320" r="4.5" fill="#22C55E"/>
    <circle cx="240" cy="360" r="6" fill="url(#nodeGlow)"/>
    <circle cx="248" cy="400" r="7" fill="url(#nodeGlow)"/>

    <!-- Madagascar -->
    <circle cx="370" cy="300" r="5" fill="#F59E0B"/>
  </g>

  <!-- Center accent node -->
  <circle cx="260" cy="250" r="3" fill="#F59E0B" opacity="0.9"/>
</svg>
