<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Mini icon mark -->
  <g transform="translate(40, 30)">
    <circle cx="50" cy="20" r="8" fill="#22C55E"/>
    <circle cx="30" cy="50" r="6" fill="#22C55E"/>
    <circle cx="70" cy="45" r="6" fill="#22C55E"/>
    <circle cx="50" cy="75" r="7" fill="#22C55E"/>
    <circle cx="80" cy="70" r="5" fill="#F59E0B"/>
    <line x1="50" y1="20" x2="30" y2="50" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="50" y1="20" x2="70" y2="45" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="30" y1="50" x2="70" y2="45" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="30" y1="50" x2="50" y2="75" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="70" y1="45" x2="50" y2="75" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="70" y1="45" x2="80" y2="70" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <line x1="80" y1="70" x2="50" y2="75" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- "Angavu" -->
  <text x="170" y="95" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="700" fill="url(#textGrad)" letter-spacing="-2">Angavu</text>

  <!-- "Intelligence" -->
  <text x="530" y="95" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="300" fill="#94a3b8" letter-spacing="-1">Intelligence</text>

  <!-- Tagline -->
  <text x="172" y="130" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#64748b" letter-spacing="4" text-transform="uppercase">AFRICA'S INFORMAL ECONOMY OS</text>
</svg>
