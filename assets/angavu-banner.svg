<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="spotGlow" cx="25%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotGlow2" cx="75%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#spotGlow)"/>
  <rect width="1280" height="640" fill="url(#spotGlow2)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Neural network icon (left side) -->
  <g transform="translate(120, 120)" filter="url(#glow)">
    <!-- Connections -->
    <g stroke="#F59E0B" stroke-width="1.5" opacity="0.6" fill="none">
      <line x1="200" y1="30" x2="160" y2="90"/>
      <line x1="200" y1="30" x2="250" y2="80"/>
      <line x1="160" y1="90" x2="250" y2="80"/>
      <line x1="160" y1="90" x2="120" y2="160"/>
      <line x1="250" y1="80" x2="290" y2="150"/>
      <line x1="160" y1="90" x2="210" y2="200"/>
      <line x1="250" y1="80" x2="210" y2="200"/>
      <line x1="120" y1="160" x2="210" y2="200"/>
      <line x1="290" y1="150" x2="210" y2="200"/>
      <line x1="120" y1="160" x2="150" y2="250"/>
      <line x1="210" y1="200" x2="150" y2="250"/>
      <line x1="210" y1="200" x2="260" y2="260"/>
      <line x1="290" y1="150" x2="260" y2="260"/>
      <line x1="150" y1="250" x2="200" y2="320"/>
      <line x1="260" y1="260" x2="200" y2="320"/>
      <line x1="210" y1="200" x2="200" y2="320"/>
      <line x1="260" y1="260" x2="310" y2="290"/>
      <line x1="290" y1="150" x2="310" y2="290"/>
      <line x1="310" y1="290" x2="200" y2="320"/>
      <line x1="120" y1="160" x2="100" y2="210"/>
      <line x1="100" y1="210" x2="150" y2="250"/>
    </g>

    <!-- Nodes -->
    <circle cx="200" cy="30" r="10" fill="#22C55E"/>
    <circle cx="160" cy="90" r="8" fill="#22C55E"/>
    <circle cx="250" cy="80" r="8" fill="#22C55E"/>
    <circle cx="120" cy="160" r="7" fill="#22C55E"/>
    <circle cx="290" cy="150" r="7" fill="#22C55E"/>
    <circle cx="100" cy="210" r="5" fill="#22C55E"/>
    <circle cx="210" cy="200" r="9" fill="#22C55E"/>
    <circle cx="150" cy="250" r="7" fill="#22C55E"/>
    <circle cx="260" cy="260" r="7" fill="#22C55E"/>
    <circle cx="200" cy="320" r="9" fill="#22C55E"/>
    <circle cx="310" cy="290" r="6" fill="#F59E0B"/>
    <circle cx="210" cy="200" r="3" fill="#F59E0B"/>
  </g>

  <!-- Text content (right side) -->
  <g>
    <text x="620" y="240" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)" letter-spacing="-1.5">Angavu</text>
    <text x="620" y="310" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="300" fill="#e2e8f0" letter-spacing="-1">Intelligence</text>
    <text x="622" y="360" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#94a3b8" letter-spacing="6">AFRICA'S INFORMAL ECONOMY OS</text>

    <!-- Stats row -->
    <g transform="translate(620, 410)">
      <text x="0" y="0" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#22C55E">$1.3T</text>
      <text x="0" y="28" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" letter-spacing="2">INFORMAL ECONOMY</text>

      <text x="200" y="0" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#F59E0B">600M+</text>
      <text x="200" y="28" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" letter-spacing="2">WORKERS</text>

      <text x="400" y="0" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#1E40AF">54</text>
      <text x="400" y="28" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" letter-spacing="2">COUNTRIES</text>
    </g>

    <!-- Bottom line -->
    <line x1="620" y1="470" x2="1100" y2="470" stroke="#1e3a5f" stroke-width="1"/>

    <text x="622" y="510" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b">
      Making invisible workers visible through data intelligence
    </text>

    <text x="622" y="550" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#475569">
      Msaidizi · Soko Pulse · Alama Score · Distribution Intelligence
    </text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1280" height="20" fill="#22C55E" opacity="0.8"/>
  <rect x="0" y="625" width="427" height="15" fill="#22C55E"/>
  <rect x="427" y="625" width="426" height="15" fill="#F59E0B"/>
  <rect x="853" y="625" width="427" height="15" fill="#1E40AF"/>
</svg>
