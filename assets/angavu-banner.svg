  <text x="780" y="220" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="300" fill="#E8A838" letter-spacing="12" opacity="0.85">INTELLIGENCE</text>
