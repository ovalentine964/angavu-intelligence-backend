  <text x="780" y="280" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="#FFFFFF" opacity="0.5" letter-spacing="2">Africa-Powered AI · Kenya HQ</text>
