    <line x1="273" y1="60" x2="190" y2="215" stroke-width="1.8"/>
    <line x1="273" y1="60" x2="298" y2="145" stroke-width="1.8"/>
    <line x1="190" y1="215" x2="180" y2="140" stroke-width="1.8"/>
