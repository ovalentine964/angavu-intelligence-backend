<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2D42"/>
      <stop offset="50%" stop-color="#1B4965"/>
      <stop offset="100%" stop-color="#0F2D42"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0C060" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>

